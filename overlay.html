<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valo Tracker Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: transparent;
            user-select: none;
            -webkit-app-region: drag;
            /* Neutralino.js ドラッグ対応 */
            overflow: hidden;
        }

        /* ─ メインパネル ─────────────────── */
        .panel {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 280px;
            background: linear-gradient(135deg, rgba(15, 12, 25, 0.92) 0%, rgba(26, 20, 45, 0.92) 100%);
            border: 1px solid rgba(255, 70, 85, 0.35);
            border-radius: 12px;
            padding: 16px;
            backdrop-filter: blur(12px);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.04) inset,
                0 8px 32px rgba(0, 0, 0, 0.6),
                0 0 24px rgba(255, 70, 85, 0.08);
            animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        /* ─ ヘッダー ─────────────────────── */
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }

        .logo {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #ff4655, #c0392b);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 900;
            color: #fff;
            box-shadow: 0 2px 8px rgba(255, 70, 85, 0.4);
        }

        .title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
        }

        .badge {
            margin-left: auto;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #ff4655;
            background: rgba(255, 70, 85, 0.12);
            border: 1px solid rgba(255, 70, 85, 0.3);
            border-radius: 4px;
            padding: 2px 6px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* ─ プレイヤーカード ─────────────── */
        .player {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, #1a1030, #2d1a50);
            border: 2px solid rgba(255, 70, 85, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            overflow: hidden;
            position: relative;
        }

        .avatar::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 60%, rgba(255, 70, 85, 0.25));
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-name {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-rank {
            font-size: 10px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 1px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .rank-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ff4655;
        }

        /* ─ ステータスグリッド ───────────── */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin-bottom: 14px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            padding: 8px 6px;
            text-align: center;
            transition: background 0.2s;
        }

        .stat:hover {
            background: rgba(255, 255, 255, 0.07);
        }

        .stat-value {
            font-size: 16px;
            font-weight: 900;
            color: #fff;
            line-height: 1;
        }

        .stat-label {
            font-size: 8px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 3px;
        }

        .stat.highlight .stat-value {
            color: #ff4655;
        }

        /* ─ フォーカスインジケーター ─────── */
        .focus-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 10px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.05em;
        }

        .focus-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #2ecc71;
            box-shadow: 0 0 6px #2ecc71;
            animation: blink 1.5s ease-in-out infinite;
            flex-shrink: 0;
        }

        .focus-dot.inactive {
            background: #636e72;
            box-shadow: none;
            animation: none;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 6px #2ecc71;
            }

            50% {
                opacity: 0.5;
                box-shadow: 0 0 2px #2ecc71;
            }
        }

        .focus-text {
            flex: 1;
        }
    </style>
</head>

<body>

    <div class="panel">
        <!-- ヘッダー -->
        <div class="header">
            <div class="logo">V</div>
            <div class="title">Valo Tracker</div>
            <div class="badge" id="badge">LIVE</div>
        </div>

        <!-- プレイヤーカード -->
        <div class="player">
            <div class="avatar">🎮</div>
            <div class="player-info">
                <div class="player-name" id="player-name">読み込み中...</div>
                <div class="player-rank">
                    <span class="rank-dot"></span>
                    <span id="player-rank">---</span>
                </div>
            </div>
        </div>

        <!-- ステータスグリッド -->
        <div class="stats">
            <div class="stat highlight">
                <div class="stat-value" id="stat-kd">--</div>
                <div class="stat-label">K/D</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-hs">--%</div>
                <div class="stat-label">HS率</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-wins">--</div>
                <div class="stat-label">勝利数</div>
            </div>
        </div>

        <!-- フォーカスインジケーター -->
        <div class="focus-bar">
            <span class="focus-dot" id="focus-dot"></span>
            <span class="focus-text" id="focus-text">Valorant running</span>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // ── Electron 環境（nodeIntegration:true）───────────────
            if (typeof require !== 'undefined') {
                try {
                    const { ipcRenderer } = require('electron');
                    ipcRenderer.on('focus-changed', (_, d) => setFocused(d.isFocused));
                    ipcRenderer.on('player-data', (_, d) => updateDisplay(d));
                    return;
                } catch (_) { }
            }

            // ── ブラウザプレビュー: WebSocket (localhost:3700) ─────────
            try {
                const ws = new WebSocket('ws://localhost:3700');
                ws.addEventListener('message', (e) => {
                    const msg = JSON.parse(e.data);
                    if (msg.type === 'focus') setFocused(msg.isFocused);
                    if (msg.type === 'playerData') updateDisplay(msg.data);
                });
            } catch (_) { }

            // ブラウザプレビュー用モックデータ
            updateDisplay({ name: 'Player#1234', rank: 'Immortal 2', kd: '1.42', hs: '28', wins: '312' });
        });

        function updateDisplay(data) {
            if (data.name) document.getElementById('player-name').textContent = data.name;
            if (data.rank) document.getElementById('player-rank').textContent = data.rank;
            if (data.kd) document.getElementById('stat-kd').textContent = data.kd;
            if (data.hs) document.getElementById('stat-hs').textContent = data.hs + '%';
            if (data.wins) document.getElementById('stat-wins').textContent = data.wins;
        }

        function setFocused(isFocused) {
            const dot = document.getElementById('focus-dot');
            const text = document.getElementById('focus-text');
            dot.className = isFocused ? 'focus-dot' : 'focus-dot inactive';
            text.textContent = isFocused ? 'Valorant running' : 'Backgrounded...';
        }
    </script>
</body>

</html>
